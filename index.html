<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>CAMPINA 86</title>
<meta name="description" content="CAMPINA 86 — jogo de plataforma 16-bits sobre gazear aula no centro de Campina Grande com o Murrinha.">
<meta name="theme-color" content="#2a1840">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CAMPINA 86">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #101018;
    overflow: hidden;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: monospace;
  }
  #game {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
  }
  /* aviso para girar o celular */
  #rotate {
    display: none;
    position: fixed; inset: 0; z-index: 30;
    background: #101018; color: #f2d24e;
    text-align: center;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; font-size: 18px;
  }
  #rotate .phone { font-size: 48px; animation: rot 1.6s ease-in-out infinite; }
  @keyframes rot { 0%,20% { transform: rotate(0deg); } 60%,100% { transform: rotate(90deg); } }
  @media (orientation: portrait) {
    #rotate { display: flex; }
  }
  /* controles touch */
  #controls { display: none; }
  #controls.on { display: block; }
  #controls > div {
    position: fixed; z-index: 20;
    opacity: 0.35;
  }
  #pad {
    left: 4vmin; bottom: 5vmin;
    width: 34vmin; height: 34vmin;
    border-radius: 50%;
    background:
      radial-gradient(circle, #303040 0 30%, transparent 31%),
      conic-gradient(#404055 0 25%, #35354a 0 50%, #404055 0 75%, #35354a 0);
    border: 2px solid #55556a;
  }
  #pad::before, #pad::after {
    content: '◀'; color: #9aa0ac; font-size: 6vmin;
    position: absolute; top: 50%; transform: translateY(-50%);
  }
  #pad::before { left: 2.5vmin; }
  #pad::after { content: '▶'; right: 2.5vmin; }
  #btnA, #btnB {
    width: 17vmin; height: 17vmin; border-radius: 50%;
    color: #fff; font-size: 7vmin; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid rgba(255,255,255,0.35);
  }
  #btnA { right: 5vmin; bottom: 15vmin; background: #c81e14; }
  #btnB { right: 24vmin; bottom: 5vmin; background: #2a52c0; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="controls">
  <div id="pad"></div>
  <div id="btnB">B</div>
  <div id="btnA">A</div>
</div>

<div id="rotate">
  <div class="phone">📱</div>
  <div>GIRE O CELULAR<br>PRA GAZEAR DIREITO!</div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
